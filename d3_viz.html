<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Category Overview — 2016 Olympics Track &amp; Field</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f8f9fa;
      padding: 24px;
      color: #333;
    }

    .chart-container {
      max-width: 860px;
      margin: 0 auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
      padding: 28px 34px 20px;
    }

    .chart-title {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .chart-subtitle {
      font-size: 12.5px;
      color: #777;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .control-label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
    }

    .btn {
      padding: 5px 18px;
      border: 2px solid #ccc;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      color: #777;
      transition: all 0.2s;
    }

    .btn.active {
      background: #3d85c8;
      border-color: #3d85c8;
      color: white;
      font-weight: 600;
    }

    .btn:hover:not(.active) {
      border-color: #3d85c8;
      color: #3d85c8;
    }

    .legend {
      display: flex;
      gap: 22px;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* D3 SVG styles */
    .bar { cursor: pointer; }
    .bar:hover { filter: brightness(1.13); }
    .bar.dimmed { opacity: 0.2; }
    .bar.highlighted { stroke: #333; stroke-width: 1.8px; }

    .axis text { font-size: 12px; fill: #555; }
    .axis path, .axis line { stroke: #ddd; }
    .grid line { stroke: #f1f1f1; }
    .grid path { stroke: none; }

    .y-label {
      font-size: 13px;
      fill: #555;
    }

    .baseline {
      stroke: #e07b00;
      stroke-width: 1.5px;
      stroke-dasharray: 6 4;
    }

    .baseline-label {
      font-size: 11px;
      fill: #e07b00;
    }

    /* Tooltip */
    .tooltip {
      position: fixed;
      background: rgba(20, 20, 30, 0.93);
      color: #fff;
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 13px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      line-height: 1.75;
      z-index: 999;
      max-width: 230px;
    }

    .tip-title {
      font-weight: 700;
      font-size: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.25);
      padding-bottom: 5px;
      margin-bottom: 6px;
    }

    .tip-gender {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 2px;
    }

    .hint {
      font-size: 11px;
      color: #bbb;
      margin-top: 10px;
      text-align: right;
    }
  </style>
</head>
<body>

<div class="chart-container">
  <div class="chart-title">Athlete Participation &amp; Medal Rate by Event Category</div>
  <div class="chart-subtitle">
    2016 Summer Olympics — Track &amp; Field &nbsp;|&nbsp;
    Hover for details &nbsp;·&nbsp; Click a bar to highlight that category &nbsp;·&nbsp; Toggle the metric with the buttons below
  </div>

  <div class="controls">
    <span class="control-label">Show:</span>
    <button class="btn active" id="btn-count">Athlete Count</button>
    <button class="btn"        id="btn-rate">Medal Rate (%)</button>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#4FC3F7;"></div>
      <span>Men</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#F472B6;"></div>
      <span>Women</span>
    </div>
  </div>

  <div id="chart"></div>
  <div class="hint">Click a bar to highlight that event category &nbsp;·&nbsp; Click again to deselect</div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ── Data (generated by DS4200_Project_Visuals.ipynb — replace with actual output) ──
const athleteData = [
  {"event_category":"Combined Events","gender":"M","gender_label":"Men","total":24,"medalists":3,"medal_rate":12.5,"avg_age":26.3,"avg_height":187.2,"avg_weight":88.4,"avg_bmi":25.2},
  {"event_category":"Combined Events","gender":"F","gender_label":"Women","total":22,"medalists":3,"medal_rate":13.6,"avg_age":25.8,"avg_height":175.4,"avg_weight":65.2,"avg_bmi":21.2},
  {"event_category":"Jumps","gender":"M","gender_label":"Men","total":85,"medalists":12,"medal_rate":14.1,"avg_age":25.1,"avg_height":184.3,"avg_weight":76.8,"avg_bmi":22.6},
  {"event_category":"Jumps","gender":"F","gender_label":"Women","total":78,"medalists":12,"medal_rate":15.4,"avg_age":24.6,"avg_height":171.2,"avg_weight":60.4,"avg_bmi":20.6},
  {"event_category":"Long Distance/Race Walking","gender":"M","gender_label":"Men","total":180,"medalists":15,"medal_rate":8.3,"avg_age":28.4,"avg_height":172.1,"avg_weight":58.3,"avg_bmi":19.7},
  {"event_category":"Long Distance/Race Walking","gender":"F","gender_label":"Women","total":120,"medalists":12,"medal_rate":10.0,"avg_age":27.9,"avg_height":162.4,"avg_weight":49.8,"avg_bmi":18.9},
  {"event_category":"Middle Distance","gender":"M","gender_label":"Men","total":95,"medalists":9,"medal_rate":9.5,"avg_age":24.8,"avg_height":178.2,"avg_weight":64.3,"avg_bmi":20.2},
  {"event_category":"Middle Distance","gender":"F","gender_label":"Women","total":88,"medalists":9,"medal_rate":10.2,"avg_age":24.1,"avg_height":167.3,"avg_weight":55.6,"avg_bmi":19.9},
  {"event_category":"Relays","gender":"M","gender_label":"Men","total":110,"medalists":18,"medal_rate":16.4,"avg_age":23.5,"avg_height":179.4,"avg_weight":72.1,"avg_bmi":22.4},
  {"event_category":"Relays","gender":"F","gender_label":"Women","total":100,"medalists":18,"medal_rate":18.0,"avg_age":23.1,"avg_height":168.2,"avg_weight":59.3,"avg_bmi":20.9},
  {"event_category":"Sprints/Hurdles","gender":"M","gender_label":"Men","total":245,"medalists":27,"medal_rate":11.0,"avg_age":24.2,"avg_height":181.5,"avg_weight":76.4,"avg_bmi":23.2},
  {"event_category":"Sprints/Hurdles","gender":"F","gender_label":"Women","total":220,"medalists":27,"medal_rate":12.3,"avg_age":23.8,"avg_height":169.8,"avg_weight":61.2,"avg_bmi":21.2},
  {"event_category":"Throws","gender":"M","gender_label":"Men","total":95,"medalists":12,"medal_rate":12.6,"avg_age":27.8,"avg_height":191.4,"avg_weight":113.5,"avg_bmi":31.0},
  {"event_category":"Throws","gender":"F","gender_label":"Women","total":85,"medalists":12,"medal_rate":14.1,"avg_age":27.4,"avg_height":176.3,"avg_weight":88.6,"avg_bmi":28.5}
];

// ── Chart ──────────────────────────────────────────────────────────────────────
(function () {
  const margin = { top: 22, right: 24, bottom: 112, left: 68 };
  const totalW = 800, totalH = 430;
  const W = totalW - margin.left - margin.right;
  const H = totalH - margin.top  - margin.bottom;

  const svg = d3.select('#chart').append('svg')
    .attr('viewBox', `0 0 ${totalW} ${totalH}`)
    .attr('width', '100%')
    .style('overflow', 'visible')
    .append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

  const categories = [...new Set(athleteData.map(d => d.event_category))].sort();
  const genders    = ['M', 'F'];
  const colorMap   = { M: '#4FC3F7', F: '#F472B6' };

  // Outer scale (by category)
  const x0 = d3.scaleBand()
    .domain(categories)
    .range([0, W])
    .paddingInner(0.22)
    .paddingOuter(0.06);

  // Inner scale (by gender within category)
  const x1 = d3.scaleBand()
    .domain(genders)
    .range([0, x0.bandwidth()])
    .padding(0.06);

  // Y scales for each metric
  const yCount = d3.scaleLinear()
    .domain([0, d3.max(athleteData, d => d.total) * 1.18])
    .nice().range([H, 0]);

  const yRate = d3.scaleLinear()
    .domain([0, d3.max(athleteData, d => d.medal_rate) * 1.25])
    .nice().range([H, 0]);

  let currentY = yCount;
  let currentMetric = 'count';
  let selectedCat = null;

  // ── Grid lines ──────────────────────────────────────────────────────────────
  const gridG = svg.append('g').attr('class', 'grid');

  function drawGrid(y) {
    gridG.selectAll('line')
      .data(y.ticks(6))
      .join('line')
        .attr('x1', 0).attr('x2', W)
        .attr('y1', d => y(d)).attr('y2', d => y(d));
  }
  drawGrid(currentY);

  // ── X axis ──────────────────────────────────────────────────────────────────
  const xAxisG = svg.append('g')
    .attr('class', 'axis')
    .attr('transform', `translate(0,${H})`)
    .call(d3.axisBottom(x0).tickSize(0));

  xAxisG.select('.domain').remove();
  xAxisG.selectAll('.tick text')
    .attr('transform', 'rotate(-38)')
    .style('text-anchor', 'end')
    .attr('dx', '-0.4em').attr('dy', '0.2em');

  // ── Y axis ──────────────────────────────────────────────────────────────────
  const yAxisG = svg.append('g')
    .attr('class', 'axis')
    .call(d3.axisLeft(currentY).ticks(6));

  const yLabelEl = svg.append('text')
    .attr('class', 'y-label')
    .attr('transform', 'rotate(-90)')
    .attr('y', -margin.left + 16)
    .attr('x', -H / 2)
    .attr('text-anchor', 'middle')
    .text('Athlete Count');

  // ── Baseline reference (overall medal rate) ─────────────────────────────────
  const totalMedalists = d3.sum(athleteData, d => d.medalists);
  const totalAthletes  = d3.sum(athleteData, d => d.total);
  const overallRate    = +(totalMedalists / totalAthletes * 100).toFixed(1);

  const baselineG = svg.append('g').attr('class', 'baseline-group').style('display', 'none');
  baselineG.append('line')
    .attr('class', 'baseline')
    .attr('x1', 0).attr('x2', W)
    .attr('y1', yRate(overallRate)).attr('y2', yRate(overallRate));
  baselineG.append('text')
    .attr('class', 'baseline-label')
    .attr('x', W + 4).attr('y', yRate(overallRate) + 4)
    .text(`Overall ${overallRate}%`);

  // ── Bars ────────────────────────────────────────────────────────────────────
  const catGroups = svg.selectAll('.cat-g')
    .data(categories)
    .join('g')
      .attr('class', 'cat-g')
      .attr('transform', cat => `translate(${x0(cat)},0)`);

  catGroups.selectAll('rect.bar')
    .data(cat => genders
      .map(g => athleteData.find(d => d.event_category === cat && d.gender === g))
      .filter(Boolean))
    .join('rect')
      .attr('class', 'bar')
      .attr('x', d => x1(d.gender))
      .attr('width', x1.bandwidth())
      .attr('fill', d => colorMap[d.gender])
      .attr('rx', 3)
      .attr('y', d => currentY(d.total))
      .attr('height', d => H - currentY(d.total));

  // ── Tooltip ─────────────────────────────────────────────────────────────────
  const tip = d3.select('#tooltip');

  svg.selectAll('.bar')
    .on('mouseover', (event, d) => {
      tip.style('opacity', 1).html(`
        <div class="tip-title">${d.event_category}</div>
        <div class="tip-gender">${d.gender === 'M' ? '♂ Men' : '♀ Women'}</div>
        <div>Athletes: <b>${d.total}</b></div>
        <div>Medalists: <b>${d.medalists}</b></div>
        <div>Medal Rate: <b>${d.medal_rate}%</b></div>
        <div>Avg Age: <b>${d.avg_age ?? '—'} yrs</b></div>
        <div>Avg Height: <b>${d.avg_height ?? '—'} cm</b></div>
        <div>Avg Weight: <b>${d.avg_weight ?? '—'} kg</b></div>
      `);
    })
    .on('mousemove', event => {
      tip.style('left', (event.clientX + 14) + 'px')
         .style('top',  (event.clientY - 24) + 'px');
    })
    .on('mouseout', () => tip.style('opacity', 0))
    .on('click', (event, d) => {
      if (selectedCat === d.event_category) {
        selectedCat = null;
        svg.selectAll('.bar')
          .classed('dimmed', false)
          .classed('highlighted', false);
      } else {
        selectedCat = d.event_category;
        svg.selectAll('.bar')
          .classed('dimmed',      b => b.event_category !== selectedCat)
          .classed('highlighted', b => b.event_category === selectedCat);
      }
    });

  // ── Toggle metric ───────────────────────────────────────────────────────────
  function switchMetric(metric) {
    currentMetric = metric;
    currentY = metric === 'count' ? yCount : yRate;
    const accessor = metric === 'count' ? d => d.total : d => d.medal_rate;

    gridG.selectAll('line').remove();
    drawGrid(currentY);

    yAxisG.transition().duration(450)
      .call(d3.axisLeft(currentY).ticks(6));

    yLabelEl.text(metric === 'count' ? 'Athlete Count' : 'Medal Rate (%)');

    // Show/hide baseline reference line (only makes sense for medal rate)
    baselineG
      .style('display', metric === 'rate' ? null : 'none')
      .attr('y1', yRate(overallRate))
      .attr('y2', yRate(overallRate));

    svg.selectAll('.bar').transition().duration(450)
      .attr('y',      d => currentY(accessor(d)))
      .attr('height', d => H - currentY(accessor(d)));
  }

  document.getElementById('btn-count').addEventListener('click', () => {
    document.getElementById('btn-count').classList.add('active');
    document.getElementById('btn-rate').classList.remove('active');
    switchMetric('count');
  });

  document.getElementById('btn-rate').addEventListener('click', () => {
    document.getElementById('btn-rate').classList.add('active');
    document.getElementById('btn-count').classList.remove('active');
    switchMetric('rate');
  });

})();
</script>
</body>
</html>
